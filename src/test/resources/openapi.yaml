openapi: 3.0.1
info:
  title: Middleware API
  version: "1.0.0"
  description: API del sistema middleware
servers:
  - url: /SID
    description: SID Application Server

paths:
  /salesforce/account:
    get:
      summary: Lista di account
      description: Restituisce tutti gli account disponibili
      tags:
        - Account
      responses:
        '200':
          description: Lista degli account
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'
        '500':
          description: Errore interno del server

  /salesforce/account/{id}:
    get:
      summary: Dettaglio di un account
      description: Restituisce i dettagli di un account (se il metodo `GET` sarà implementato)
      tags:
        - Account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Dettaglio account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          description: Account non trovato

  /salesforce/account/{id}/products:
    get:
      summary: Prodotti di un account
      description: Restituisce la lista dei prodotti associati a un account
      tags:
        - Account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Lista prodotti dell'account
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountProduct'
        '500':
          description: Errore interno del server

components:
  schemas:
    Account:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    AccountProduct:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        accountId:
          type: integer
